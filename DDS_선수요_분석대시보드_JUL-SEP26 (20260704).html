<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KE/OZ DDS 선수요 분석 대시보드 | JUL-SEP26</title>
<style>
:root{
  --ke:#0f3b7a; --ke-l:#3a6fc4; --oz:#b23a48; --oz-l:#d98790;
  --bg:#f4f6fa; --card:#ffffff; --ink:#1c2430; --sub:#5b6a7f;
  --line:#e3e8f0; --up:#0a7d4f; --dn:#c0392b; --note:#fffbe9; --noteb:#e8d99a;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Malgun Gothic','Yu Gothic','Meiryo','Apple SD Gothic Neo','Noto Sans KR','Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}
.wrap{max-width:1280px;margin:0 auto;padding:16px}
header{background:linear-gradient(135deg,#0f3b7a,#1a5cb0);color:#fff;border-radius:12px;padding:18px 22px;margin-bottom:14px;position:relative}
header h1{font-size:19px;margin-bottom:4px;padding-right:110px}
header .meta{font-size:12px;opacity:.85;display:flex;flex-wrap:wrap;gap:14px}
.langseg{position:absolute;top:16px;right:16px;display:inline-flex;background:rgba(255,255,255,.18);border-radius:8px;padding:3px}
.langseg button{border:0;background:transparent;padding:5px 12px;border-radius:6px;font-size:12px;font-weight:800;color:#dbe6f5;cursor:pointer;font-family:inherit}
.langseg button.on{background:#fff;color:var(--ke)}
.ctrl{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0;align-items:center;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:10;border-bottom:1px solid var(--line)}
.seg{display:inline-flex;background:#e8edf5;border-radius:8px;padding:3px}
.seg button{border:0;background:transparent;padding:7px 14px;border-radius:6px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;font-family:inherit}
.seg button.on{background:var(--ke);color:#fff}
.seg.mseg button.on{background:#b07514}
.seg-label{font-size:12px;color:var(--sub);font-weight:700;margin-right:2px}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px 18px;margin-bottom:14px}
h2{font-size:15px;color:var(--ke);border-left:4px solid var(--ke);padding-left:9px;margin-bottom:10px}
h2 .mtag{font-size:11px;background:#fef4e2;color:#b07514;border-radius:10px;padding:2px 9px;margin-left:8px;vertical-align:1px}
.note{background:var(--note);border:1px solid var(--noteb);border-radius:8px;padding:11px 14px;margin-bottom:12px}
.note b.t{display:block;color:#8a6d1a;font-size:12px;margin-bottom:5px}
.note ul{margin-left:16px}
.note li{margin:3px 0}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:12px}
.kpi{background:#f8fafd;border:1px solid var(--line);border-radius:10px;padding:10px 12px}
.kpi .l{font-size:11px;color:var(--sub);font-weight:700}
.kpi .v{font-size:19px;font-weight:800;margin:2px 0}
.kpi .d{font-size:11px;font-weight:700}
.up{color:var(--up)}.dn{color:var(--dn)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#eef2f8;color:#33415c;padding:7px 6px;border-bottom:2px solid #cfd8e6;text-align:right;white-space:nowrap}
th:first-child,td:first-child{text-align:left}
td{padding:6px;border-bottom:1px solid var(--line);text-align:right;white-space:nowrap;font-variant-numeric:tabular-nums}
tr:hover td{background:#f5f8fc}
.od{font-weight:800;color:var(--ke)}
.bar{height:14px;border-radius:3px;display:flex;overflow:hidden;min-width:110px;background:#edf0f5}
.bar .k{background:var(--ke)}.bar .o{background:var(--oz-l)}
.tblwrap{overflow-x:auto}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:900px){.grid2{grid-template-columns:1fr}}
.month-chart{display:flex;gap:22px;align-items:flex-end;height:150px;padding:8px 6px 0}
.mcol{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;gap:4px;border-radius:8px;cursor:pointer}
.mcol.sel{background:#fef4e2}
.mbars{display:flex;gap:6px;align-items:flex-end;height:100px}
.mbar{width:30px;border-radius:4px 4px 0 0;position:relative}
.mbar span{position:absolute;top:-16px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:800;white-space:nowrap}
.mlab{font-size:12px;font-weight:800;color:var(--sub);padding-bottom:3px}
.legend{display:flex;gap:14px;font-size:11px;color:var(--sub);margin:4px 0 8px}
.legend i{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:-1px}
.subgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:12px}
.subcard{border:1px solid var(--line);border-radius:10px;padding:12px}
.subcard h3{font-size:14px;color:var(--ke);margin-bottom:6px;display:flex;justify-content:space-between;align-items:baseline}
.subcard h3 small{font-size:11px;color:var(--sub);font-weight:400}
.tag{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:10px;margin-left:6px}
.tag.mono{background:#e2f3ea;color:#0a7d4f}
.tag.comp{background:#fdecea;color:#c0392b}
.tag.mid{background:#fef4e2;color:#b07514}
.foot{text-align:center;font-size:11px;color:var(--sub);padding:10px 0 22px}
.dim{color:var(--sub);font-size:11px}
.tabs{display:flex;gap:6px;margin-bottom:12px}
.tabs button{border:1px solid var(--line);background:#f2f5fa;padding:7px 16px;border-radius:8px 8px 0 0;font-size:12px;font-weight:800;color:var(--sub);cursor:pointer;font-family:inherit}
.tabs button.on{background:var(--ke);color:#fff;border-color:var(--ke)}
.agtgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:10px}
.agtcard{border:1px solid var(--line);border-radius:10px;padding:11px 13px;background:#fcfdff}
.agtcard h4{font-size:13px;color:var(--ke);margin-bottom:3px}
.agtcard h4 .code{font-size:10px;color:#fff;background:var(--ke);border-radius:4px;padding:1px 6px;margin-right:6px;vertical-align:1px}
.agtcard .full{font-size:10px;color:var(--sub);margin-bottom:5px}
.agtcard p{font-size:11.5px;color:#33415c;margin-bottom:5px}
.agtcard .meta2{font-size:10px;color:var(--sub)}
.ttag{display:inline-block;font-size:9.5px;font-weight:800;padding:1px 7px;border-radius:9px;margin-right:4px}
.t-ota{background:#e3edfb;color:#1a5cb0}.t-whl{background:#efe6f7;color:#6a3d9a}.t-pkg{background:#e2f3ea;color:#0a7d4f}.t-eth{background:#fdecea;color:#c0392b}.t-btm{background:#fef4e2;color:#b07514}.t-oz{background:#f3d9dc;color:#8c2430}
</style>
</head>

function L(){return T[lang];}
function segInit(id,cb){
  const el=document.getElementById(id);
  el.querySelectorAll('button').forEach(b=>b.onclick=()=>{
    el.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');cb(b.dataset.v);
  });
}
segInit('segScope',v=>{scope=v;render()});
segInit('segBasis',v=>{basis=v;render()});
segInit('segMonth',v=>{mon=v;render()});
segInit('segLang',v=>{lang=v;applyLang();render()});
document.querySelector('#segBasis button[data-v="bi"]').classList.add('on');
function setMonth(m){
  mon=m;
  document.querySelectorAll('#segMonth button').forEach(b=>b.classList.toggle('on',b.dataset.v===m));
  render();
}
function D(){return MAIN[basis+'_'+scope];}
const g=v=>v[mon];
const monLabel=()=>mon==='TTL'?L().monTTL:L().monOne(mon);

function applyLang(){
  const t=L();
  document.documentElement.lang=lang;
  document.getElementById('hTitle').textContent=t.title;
  document.getElementById('hMeta').innerHTML=t.meta;
  document.querySelectorAll('[data-t]').forEach(e=>{const k=e.dataset.t; if(t[k]) e.innerHTML=t[k];});
  document.getElementById('agtLegend').innerHTML=t.agtLegend;
  [['note0','n0'],['note1','n1'],['note2','n2'],['note3','n3'],['note4','n4'],['note5','n5']].forEach(([id,k])=>{
    document.getElementById(id).innerHTML=t.notes[k].map(x=>'<li>'+x+'</li>').join('');
  });
  document.getElementById('agtInfoGrid').innerHTML=AGT_INFO.map(a=>`
    <div class="agtcard">
      <h4><span class="code">${a.code}</span>${a.full}</h4>
      <div class="full">${a.full} (${a.cty[lang]})　${a.tags.map(x=>`<span class="ttag t-${x}">${t.ttag[x]}</span>`).join('')}</div>
      <p>${a.desc[lang]}</p>
      <div class="meta2">▶ ${a.note[lang]}</div>
    </div>`).join('');
}
function agtTab(i,btn){
  document.getElementById('agtTab0').style.display=i===0?'':'none';
  document.getElementById('agtTab1').style.display=i===1?'':'none';
  btn.parentElement.querySelectorAll('button').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
}
function cell4(cv,lv){const c=g(cv),l=g(lv);return `<td>${f(c)}</td><td class="${cls(pct(c,l))}">${pctS(pct(c,l))}</td>`;}
function totCell(r){const c=g(r.ke)+g(r.oz),l=g(r.ke_lw)+g(r.oz_lw);return `<td><b>${f(c)}</b></td><td class="${cls(pct(c,l))}">${pctS(pct(c,l))}</td>`;}
function trendCell(r){return `<td class="dim" style="font-size:10px">${MONTHS.map(m=>f(r.ke[m]+r.oz[m])).join(' / ')}</td>`;}

function render(){
  const t=L(), d=D();
  document.getElementById('mtag0').textContent=monLabel();
  document.querySelectorAll('.mtag1').forEach(e=>e.textContent=monLabel());
  let ke,oz,kel,ozl;
  if(mon==='TTL'){
    ke=d.month.reduce((s,m)=>s+m.ke,0);oz=d.month.reduce((s,m)=>s+m.oz,0);
    kel=d.month.reduce((s,m)=>s+m.ke_lw,0);ozl=d.month.reduce((s,m)=>s+m.oz_lw,0);
  }else{const m=d.month.find(x=>x.m===mon);ke=m.ke;oz=m.oz;kel=m.ke_lw;ozl=m.ke_lw!==undefined?m.oz_lw:0;ozl=m.oz_lw;}
  document.getElementById('kpiRow').innerHTML=`
    <div class="kpi"><div class="l">${t.kKE} (${monLabel()})</div><div class="v" style="color:var(--ke)">${f(ke)}</div><div class="d ${cls(pct(ke,kel))}">${t.wow} ${pctS(pct(ke,kel))}</div></div>
    <div class="kpi"><div class="l">${t.kOZ} (${monLabel()})</div><div class="v" style="color:var(--oz)">${f(oz)}</div><div class="d ${cls(pct(oz,ozl))}">${t.wow} ${pctS(pct(oz,ozl))}</div></div>
    <div class="kpi"><div class="l">${t.kSum}</div><div class="v">${f(ke+oz)}</div><div class="d ${cls(pct(ke+oz,kel+ozl))}">${t.wow} ${pctS(pct(ke+oz,kel+ozl))}</div></div>`;
  const mx=Math.max(...d.month.flatMap(m=>[m.ke,m.oz]));
  document.getElementById('monthChart').innerHTML=d.month.map(m=>`
    <div class="mcol ${mon===m.m?'sel':''}" onclick="setMonth('${m.m}')">
      <div class="mbars">
        <div class="mbar" style="height:${Math.max(m.ke/mx*100,3)}%;background:var(--ke)"><span>${f(m.ke)}</span></div>
        <div class="mbar" style="height:${Math.max(m.oz/mx*100,3)}%;background:var(--oz-l)"><span>${f(m.oz)}</span></div>
      </div>
      <div class="mlab">${m.m} <span class="dim">KE ${pctS(pct(m.ke,m.ke_lw))} / OZ ${pctS(pct(m.oz,m.oz_lw))}</span></div>
    </div>`).join('')+`
    <div class="mcol ${mon==='TTL'?'sel':''}" onclick="setMonth('TTL')" style="max-width:110px">
      <div class="mbars"><div class="mbar" style="height:100%;background:#8fa3c4"><span>${f(d.month.reduce((s,m)=>s+m.ke+m.oz,0))}</span></div></div>
      <div class="mlab">TTL</div>
    </div>`;
  routeTable('tblRoute4',d.routes4);
  routeTable('tblRoute6',d.routes6);
  rowsTable('tblRgn',d.rgn);
  const tt=document.getElementById('tblTfdi');
  tt.innerHTML=`<tr><th>${t.thCat}</th><th>${t.thKE}</th><th>${t.thWow}</th><th>${t.thOZ}</th><th>${t.thWow}</th><th>${t.thSum}</th><th>${t.thWow}</th><th>${t.thTrend}</th></tr>`+
    d.tfdi.map(x=>`<tr><td><b>${x.tf} ${x.di==='D'?t.diD:t.diI}</b></td>${cell4(x.ke,x.ke_lw)}${cell4(x.oz,x.oz_lw)}${totCell(x)}${trendCell(x)}</tr>`).join('');
  const rd=document.getElementById('tblRdi');
  rd.innerHTML=`<tr><th>${t.thOD}</th><th>${t.thKeD}</th><th>${t.thOzD}</th><th>${t.thGap}</th></tr>`+
    D().route_di.map(r=>{
      const kd=g(r.ke_d)+g(r.ke_i)?g(r.ke_d)/(g(r.ke_d)+g(r.ke_i))*100:null;
      const od=g(r.oz_d)+g(r.oz_i)?g(r.oz_d)/(g(r.oz_d)+g(r.oz_i))*100:null;
      const gap=(kd!==null&&od!==null)?kd-od:null;
      return `<tr><td class="od">${r.od}</td><td>${kd===null?'-':kd.toFixed(1)+'%'}</td><td>${od===null?'-':od.toFixed(1)+'%'}</td><td class="${gap===null?'':(gap>=0?'up':'dn')}">${gap===null?'-':(gap>=0?'+':'')+gap.toFixed(1)}</td></tr>`;
    }).join('');
  const agt=[...d.agt].sort((a,b)=>g(b.ke)-g(a.ke));
  document.getElementById('tblAgt').innerHTML=
    `<tr><th>${t.thAGT}</th><th>${t.thKE}</th><th>${t.thWow}</th><th>${t.thOZ}</th><th>${t.thWow}</th><th>${t.thSum}</th><th>${t.thWow}</th><th>${t.thTrend}</th></tr>`+
    agt.map(r=>`<tr><td class="od">${r.name}</td>${cell4(r.ke,r.ke_lw)}${cell4(r.oz,r.oz_lw)}${totCell(r)}${trendCell(r)}</tr>`).join('');
  renderSub();
}
function routeTable(id,rows){
  const t=L(), el=document.getElementById(id);
  const vals=rows.map(r=>g(r.ke)+g(r.oz));
  const mx=Math.max(...vals,1);
  const sorted=[...rows].map((r,i)=>({r,v:vals[i]})).sort((a,b)=>{
    if(a.r.name==='OTHR')return 1; if(b.r.name==='OTHR')return -1; return b.v-a.v;});
  el.innerHTML=`<tr><th>${t.thOD}</th><th>${t.thKE}</th><th>${t.thWow}</th><th>${t.thOZ}</th><th>${t.thWow}</th><th>${t.thSum}</th><th>${t.thWow}</th><th>${t.thTrend}</th><th style="text-align:left">${t.thMix}</th></tr>`+
    sorted.map(({r,v})=>{
      const kesh=v>0?g(r.ke)/v*100:0;
      return `<tr><td class="od">${r.name}</td>${cell4(r.ke,r.ke_lw)}${cell4(r.oz,r.oz_lw)}${totCell(r)}${trendCell(r)}
      <td><div class="bar" style="width:${Math.max(v/mx*100,8)}%"><div class="k" style="width:${kesh}%"></div><div class="o" style="width:${100-kesh}%"></div></div></td></tr>`;
    }).join('');
}
function rowsTable(id,rows){
  const t=L(), el=document.getElementById(id);
  const sorted=[...rows].sort((a,b)=>(g(b.ke)+g(b.oz))-(g(a.ke)+g(a.oz)));
  el.innerHTML=`<tr><th>${t.thCat}</th><th>${t.thKE}</th><th>${t.thWow}</th><th>${t.thOZ}</th><th>${t.thWow}</th><th>${t.thSum}</th><th>${t.thWow}</th><th>${t.thTrend}</th></tr>`+
    sorted.map(r=>`<tr><td class="od">${r.name}</td>${cell4(r.ke,r.ke_lw)}${cell4(r.oz,r.oz_lw)}${totCell(r)}${trendCell(r)}</tr>`).join('');
}
function renderSub(){
  const t=L();
  const order=['CTS','OKA','UKB','KMJ','KMQ','AOJ','KOJ','KIJ','OKJ','NGS'];
  document.getElementById('subGrid').innerHTML=order.map(o=>{
    const s=SUB[o];
    const kor=g(s.kor),keK=g(s.ke_kor),lcc=g(s.lcc_kor);
    const ksv=kor?keK/kor*100:0, lccv=kor?lcc/kor*100:0;
    const tag=ksv>=95?`<span class="tag mono">${t.tagMono}</span>`:(ksv>=55?`<span class="tag mid">${t.tagMid}</span>`:`<span class="tag comp">${t.tagComp}</span>`);
    const tot=g(s.tot), totl=g(s.tot_lw);
    const rows=s.ods.map(r=>{
      const als=r.als.map(a=>`${a.al} ${f(g(a.pax))}`).join(' · ');
      return `<tr><td class="od">${r.od}</td><td>${f(g(r.tot))}</td><td class="${cls(pct(g(r.tot),g(r.tot_lw)))}">${pctS(pct(g(r.tot),g(r.tot_lw)))}</td><td class="dim" style="font-size:10px">${MONTHS.map(m=>f(r.tot[m])).join(' / ')}</td><td style="text-align:left;white-space:normal" class="dim">${als}</td></tr>`;
    }).join('');
    return `<div class="subcard">
      <h3>${o} <small>${t.subNames[o]}</small> ${tag}</h3>
      <div class="dim" style="margin-bottom:6px">${t.subTot} ${f(tot)}${t.subP} (${t.wow} <b class="${cls(pct(tot,totl))}">${pctS(pct(tot,totl))}</b>) · ${t.subKor} ${f(kor)}${t.subP} · <b>${t.subKS} ${ksv.toFixed(1)}%</b> · LCC ${lccv.toFixed(1)}%</div>
      <table><tr><th>${t.thTopOD}</th><th>PAX</th><th>${t.thWow}</th><th>J/A/S</th><th style="text-align:left">${t.thAls}</th></tr>${rows}</table>
    </div>`;
  }).join('');
}
applyLang();
render();
</script>
</body>
</html>
